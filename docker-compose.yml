version: '3.9'

services:
  backend:
    build: .
    container_name: zynexra_backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: .
    container_name: zynexra_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      - backend