services:
  backend:
    build:
      context: .
    container_name: zynexra_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  frontend:
    build:
      context: ./frontend-react
    container_name: zynexra_frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      - backend